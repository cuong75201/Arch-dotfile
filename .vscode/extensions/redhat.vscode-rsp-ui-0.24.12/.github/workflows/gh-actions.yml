name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
        publishToMarketPlace:
          description: 'Publish to VS Code Marketplace ?'
          required: true
          type: choice
          options:
            - 'true'
            - 'false'
          default: 'false'
        publishToOVSX:
          description: 'Publish to OpenVSX Registry ?'
          required: true
          type: choice
          options:
            - 'true'
            - 'false'
          default: 'false'
          
jobs:
  test:
    runs-on: ${{ matrix.os }} # runs a test on Ubuntu, Windows and macOS

    strategy:
      matrix:
        os: [macOS-latest, windows-latest, ubuntu-latest]
        node: [20]
      fail-fast: false

    steps:
    
    # SCM Checkout
    - uses: actions/checkout@v4
    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node }}

    # NPM install and build
    - run: npm install
    - run: npm run build

    # Run unit tests
    - name: Run Unit tests
      uses: GabrielBB/xvfb-action@fe2609f8182a9ed5aee7d53ff3ed04098a904df2 #v1.0
      with:
        run: npm test

    # Run UI Tests
    - name: Run UI tests
      uses: GabrielBB/xvfb-action@86d97bde4a65fe9b290c0b3fb92c2c4ed0e5302d #v1.6
      with:
        run: npm run ui-test
        options: -screen 0 2560x1440x24

    # Archive test artifacts
    - name: Archiving test artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with: 
        name: artifacts-${{ matrix.os }}
        path: |
          test-resources/screenshots/*.png
        retention-days: 2


    # Uploade codecov
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@f32b3a3741e1053eb607407145bc9619351dc93b #v2
      with:
        file: ./coverage/coverage-final.json

    # Archiving integration tests artifacts
    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: failure() && runner.os == 'Linux'
      with: 
        name: artifacts-${{ matrix.os }}
        path: |
          test-resources/screenshots/*.png
        retention-days: 2
        

  packaging-job:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' }}
    steps:
      - name: Checkout vscode-rsp-ui
        uses: actions/checkout@v4
      - name: Set Up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install NodeJS dependencies
        run: npm install -g typescript "@vscode/vsce" "ovsx"
      - name: Cache Version
        run: |
          echo "EXT_VERSION=$(cat package.json | jq -r .version)" >> $GITHUB_ENV
      - name: Build vscode-rsp-ui
        run: |
          npm install
          npm run build
      - name: Package vscode-rsp-ui
        run: |
          vsce package -o vscode-rsp-ui-${{ env.EXT_VERSION }}.vsix
          ls -lash *.vsix
      - name: Upload VSIX Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vscode-rsp-ui
          path: |
            vscode-rsp-ui-${{ env.EXT_VERSION }}.vsix
          if-no-files-found: error
  release-job:
    environment: ${{ (inputs.publishToMarketPlace == 'true' || inputs.publishToOVSX == 'true') && 'release' }}
    runs-on: ubuntu-latest
    needs: packaging-job
    steps:
      - name: Set Up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm install -g typescript "@vscode/vsce" "ovsx"
      - name: Download VSIX
        uses: actions/download-artifact@v4
      - name: Publish to VS Code Marketplace
        if: ${{ inputs.publishToMarketPlace == 'true' }}
        run: |
          ls -la #debug
          for platformVsix in vscode-rsp-ui/*.vsix; do
            echo "Running command: vsce publish --skip-duplicate -p SOME_SECRET --packagePath ${platformVsix}"
            vsce publish --skip-duplicate -p ${{ secrets.VSCODE_MARKETPLACE_TOKEN }} --packagePath ${platformVsix}
          done
      - name: Publish to OpenVSX Registry
        if: ${{ inputs.publishToOVSX == 'true' }}
        run: |
          ls -la #debug
          for platformVsix in vscode-rsp-ui/*.vsix; do
            echo "Running command: ovsx publish --skip-duplicate -p SOME_SECRET --packagePath ${platformVsix}"
            ovsx publish --skip-duplicate -p ${{ secrets.OVSX_MARKETPLACE_TOKEN }} --packagePath ${platformVsix}
          done
